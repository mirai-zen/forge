name: Deploy Platform

on:
  workflow_dispatch:
    inputs:
      service:
        description: '服务名'
        required: true
        type: string
      env:
        description: '环境 (dev/staging/prod)'
        required: true
        type: string
      branch:
        description: '分支'
        required: true
        type: string
      namespace:
        description: 'K8s 命名空间'
        required: true
        type: string

env:
  IMAGE: ghcr.io/mirai-zen/forge-platform

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=${{ inputs.env }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./platform
          file: ./platform/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Update Helm Chart
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          CHART="deploy/charts/platform/values.yaml"
          sed -i "s/tag:.*/tag: ${SHORT_SHA}/" "$CHART"
          echo "📦 Updated image tag to ${SHORT_SHA}"

      - name: Commit & Push
        run: |
          git config user.name "forge-bot"
          git config user.email "bot@forge.dev"
          git add deploy/charts/platform/values.yaml
          git commit -m "🚀 deploy(platform): update image to ${{ github.sha }}" || echo "No changes"
          git push origin main
