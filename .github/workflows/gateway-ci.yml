name: Gateway Service CI

on:
  push:
    branches: [main]
    paths:
      - 'gateway/**'
  pull_request:
    branches: [main]
    paths:
      - 'gateway/**'

env:
  SERVICE: gateway
  IMAGE: ghcr.io/mirai-zen/forge-gateway
  REPO: forge

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gateway

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: gateway/go.sum

      - name: Lint
        run: |
          go vet ./...

      - name: Test
        run: |
          go test -race -coverprofile=coverage.out ./...

      - name: Build
        run: |
          CGO_ENABLED=0 go build -ldflags="-s -w" -o bin/gateway ./cmd/

  docker:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/mirai-zen/forge-gateway
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./gateway
          file: ./gateway/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
