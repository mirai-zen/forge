name: Deploy User

on:
  workflow_dispatch:
    inputs:
      service:
        description: '服务名'
        required: true
        type: string
      env:
        description: '环境 (dev/staging/prod)'
        required: true
        type: string
      branch:
        description: '分支'
        required: true
        type: string
      namespace:
        description: 'K8s 命名空间'
        required: true
        type: string

env:
  IMAGE: ghcr.io/mirai-zen/forge-user

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=${{ inputs.env }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./user
          file: ./user/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Deploy Result
        run: |
          echo "✅ Deployed user to ${{ inputs.env }} (${{ inputs.namespace }})"
          echo "📦 Image: ${{ env.IMAGE }}:${{ steps.meta.outputs.version }}"
          echo "🌿 Branch: ${{ inputs.branch }}"
