apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: user
  namespace: infra
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/mirai-zen/forge
    targetRevision: main
    path: deploy/charts/user
    helm:
      parameters:
        - name: image.tag
          value: latest
  destination:
    server: https://kubernetes.default.svc
    namespace: forge-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
